# =============================================================================
# BOXABL MODEL FACTS - SINGLE SOURCE OF TRUTH
# =============================================================================
# Rule: every model-specific number that appears anywhere in docs/ must trace
# back to this file. Edit here first, then update the docs. This prevents the
# copy-paste drift that previously assigned BXB-000009 (361 sq ft Studio) to
# the 722 sq ft 1-Bedroom page.
#
# Oasis Engineering is independent and NOT affiliated with BOXABL.
# BOXABL's current official documents control over anything in this file.
#
# Source ids reference data/SOURCES.yaml.
# =============================================================================

version: 2
